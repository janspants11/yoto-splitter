# Run nginx workers as root for simplicity - will optimize security later
worker_processes auto;
error_log /app/nginx-error.log warn;
pid /app/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /app/nginx-access.log main;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 2G;

    # Use /tmp for nginx temp directories to avoid permission issues
    client_body_temp_path /tmp/nginx_client_temp;
    proxy_temp_path /tmp/nginx_proxy_temp;
    fastcgi_temp_path /tmp/nginx_fastcgi_temp;
    uwsgi_temp_path /tmp/nginx_uwsgi_temp;
    scgi_temp_path /tmp/nginx_scgi_temp;

    server {
        listen 80;
        server_name _;
        root /app/frontend;
        index index.html;

        # Never cache index.html so browsers always get the latest asset hashes
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Hashed assets (JS/CSS) can be cached indefinitely
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Frontend routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API proxy to backend running on port 4000
        location /api/ {
            proxy_pass http://localhost:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }
    }
}